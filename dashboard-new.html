    <script>
        const todayObj = new Date();
        const year = todayObj.getFullYear();
        const month = String(todayObj.getMonth() + 1).padStart(2, '0');
        const date = String(todayObj.getDate()).padStart(2, '0');
        const dateStr = `${year}${month}${date}`;
        document.getElementById('date-display').innerText = `📅 ${year}.${month}.${date}`;

        function getSyncRandom(seed, min, max) {
            const x = Math.sin(seed) * 10000;
            const rand = x - Math.floor(x);
            return Math.floor(rand * (max - min + 1)) + min;
        }

        function updateCounters() {
            // 모든 기기에서 동일한 랜덤 시작 숫자 (30~150 사이)
            const startCount = getSyncRandom(parseInt(dateStr), 30, 150);
            
            // 15분마다 1명씩 자연스럽게 증가하는 효과
            const minutesPassed = todayObj.getHours() * 60 + todayObj.getMinutes();
            const increment = Math.floor(minutesPassed / 15);
            
            const finalToday = startCount + increment;
            document.getElementById('today-count').innerText = "TODAY " + finalToday;

            // 전체 카운트 (기본 베이스 + 날짜별 증가분)
            const startDate = new Date("2024-01-01");
            const diffDays = Math.floor((todayObj - startDate) / (1000 * 60 * 60 * 24));
            const baseTotal = 15240; 
            const finalTotal = baseTotal + (diffDays * 45) + increment;
            
            document.getElementById('total-count').innerText = "TOTAL " + finalTotal.toLocaleString();
        }

        window.onload = updateCounters;
    </script>
