<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD WAVE - PORTAL DASHBOARD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        /* 얄쌍하고 고급진 느낌을 위한 구글 폰트 추가 (Cinzel / Montserrat) */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400&display=swap');
        
        body { margin: 0; padding: 0; background-color: #0b0d11; font-family: 'Pretendard', sans-serif; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        /* 1. 상단 헤더 & 고급 타이틀 섹션 */
        .portal-header { text-align: center; margin-top: 90px; margin-bottom: 50px; }
        .brand-logo-area { display: flex; align-items: center; justify-content: center; gap: 25px; } /* 로고와 글자 간격 */
        
        /* 🔴 랑이 요청: [로고] GOLD WAVE 형태 & 얄쌍하고 자간 넓은 글씨체 */
        .logo-img-small { width: 55px; height: auto; filter: drop-shadow(0 0 10px rgba(191, 149, 63, 0.4)); }
        
        .logo-text-title {
            color: #bf953f; 
            font-size: 52px; 
            font-weight: 200; /* 얄쌍하게 */
            letter-spacing: 12px; /* 자간을 더 떨어트림 */
            margin: 0;
            font-family: 'Montserrat', sans-serif; /* 고급진 영문 폰트 */
            text-transform: uppercase;
            background: linear-gradient(to right, #bf953f, #fcf6ba, #bf953f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 5px rgba(191, 149, 63, 0.2));
        }
        
        .sub-copy { color: #666; font-size: 14px; letter-spacing: 5px; margin-top: 25px; font-weight: 400; text-transform: uppercase; }

        /* 2. 스테이터스 바 & 카운팅 영역 */
        .status-bar {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 100px;
            padding: 18px 45px;
            display: flex; align-items: center; gap: 35px;
            margin-bottom: 75px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
        }
        .status-item { display: flex; align-items: center; gap: 12px; font-size: 14px; font-weight: 700; }
        .status-label { color: #444; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .status-value { color: #aaa; }
        .status-value.gold { color: #bf953f; font-weight: 800; }

        /* ● SYSTEM ACTIVE 초록불 */
        .active-dot {
            width: 8px; height: 8px; background-color: #00ff41; border-radius: 50%;
            display: inline-block; box-shadow: 0 0 15px #00ff41;
            animation: pulse-green 2s infinite ease-in-out;
        }
        @keyframes pulse-green { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(1.3); } 100% { opacity: 1; transform: scale(1); } }
        .system-text { color: #00ff41; letter-spacing: 2px; font-size: 12px; font-weight: 800; }

        /* 3. 메뉴 그리드 & 카드 */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; width: 92%; max-width: 1000px; margin-bottom: 100px; }
        .menu-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 22px;
            padding: 55px 35px;
            text-decoration: none;
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex; flex-direction: column; gap: 25px;
        }
        .card-icon-fa { font-size: 38px; color: #bf953f; opacity: 0.5; transition: 0.4s; }
        .card-title { color: #dcdcdc; font-size: 19px; font-weight: 800; line-height: 1.4; }
        .card-desc { color: #555; font-size: 13px; font-weight: 500; margin-top: 5px; }

        /* 호버 효과 */
        .menu-card:hover {
            transform: translateY(-12px);
            background: rgba(191, 149, 63, 0.04);
            border-color: #bf953f;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 20px rgba(191, 149, 63, 0.2);
        }
        .menu-card:hover .card-icon-fa { opacity: 1; filter: drop-shadow(0 0 10px #bf953f); }
        .menu-card:hover .card-title { color: #fff; }

        .footer-links { display: flex; gap: 20px; margin-bottom: 120px; }
        .f-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 50px; padding: 14px 28px;
            color: #777; font-size: 13px; text-decoration: none; display: flex; align-items: center; gap: 12px; transition: 0.3s;
        }
        .f-btn:hover { background: rgba(255, 255, 255, 0.06); color: #fff; }
    </style>
</head>
<body>

    <header class="portal-header">
        <div class="brand-logo-area">
            <img src="https://i.imgur.com/9VUt3sN.png" alt="Logo" class="logo-img-small">
            <h1 class="logo-text-title">GOLD WAVE</h1> 
        </div>
        <div class="sub-copy">STAY AHEAD, RIGHT HERE</div>
    </header>

    <div class="status-bar">
        <div class="status-item">
            <span class="active-dot"></span>
            <span class="system-text">SYSTEM ACTIVE</span>
        </div>
        <div style="width:1px; height:18px; background:rgba(255,255,255,0.08);"></div>
        <div class="status-item">
            <span class="status-label">DATE</span>
            <span id="current-date" class="status-value">2026.04.09</span>
        </div>
        <div style="width:1px; height:18px; background:rgba(255,255,255,0.08);"></div>
        <div class="status-item">
            <span class="status-label">TODAY</span>
            <span id="today-count" class="status-value gold">0</span>
        </div>
        <div style="width:1px; height:18px; background:rgba(255,255,255,0.08);"></div>
        <div class="status-item">
            <span class="status-label">TOTAL</span>
            <span id="total-count" class="status-value gold">0</span>
        </div>
    </div>

    <main class="menu-grid">
        <a href="가이드.html" class="menu-card">
            <i class="fa-solid fa-book-open-reader card-icon-fa"></i>
            <div>
                <div class="card-title">골드웨이브 프로그램<br>초간단 사용 설명서</div>
                <div class="card-desc">빠르게 시작하는 운용 가이드</div>
            </div>
        </a>
        <a href="faq.html" class="menu-card">
            <i class="fa-solid fa-comments card-icon-fa"></i>
            <div>
                <div class="card-title">FAQ<br>자주 묻는 질문</div>
                <div class="card-desc">궁금한 점을 빠르게 해결</div>
            </div>
        </a>
        <a href="profit.html" class="menu-card">
            <i class="fa-solid fa-chart-line card-icon-fa"></i>
            <div>
                <div class="card-title">골드웨이브 프리미엄<br>노티스 (수익현황)</div>
                <div class="card-desc">실시간 수익 현황 및 공지</div>
            </div>
        </a>
        <a href="아카이브.html" class="menu-card">
            <i class="fa-solid fa-file-invoice card-icon-fa"></i>
            <div>
                <div class="card-title">1분 브리핑<br>리포트 아카이브</div>
                <div class="card-desc">핵심만 담은 일간 리포트</div>
            </div>
        </a>
        <a href="program.html" class="menu-card">
            <i class="fa-solid fa-gears card-icon-fa"></i>
            <div>
                <div class="card-title">프로그램 소개</div>
                <div class="card-desc">골드웨이브의 전략과 철학</div>
            </div>
        </a>
        <a href="remote.html" class="menu-card">
            <i class="fa-solid fa-headset card-icon-fa"></i>
            <div>
                <div class="card-title">원격 지원 시스템</div>
                <div class="card-desc">언제든 연결되는 전담 지원</div>
            </div>
        </a>
    </main>

    <footer class="footer-links">
        <a href="#" class="f-btn"><i class="fa-brands fa-telegram"></i> 공식 채널</a>
        <a href="#" class="f-btn"><i class="fa-solid fa-comment-dots"></i> 상담문의</a>
    </footer>

    <script>
        // 날짜 자동 업데이트
        const d = new Date();
        document.getElementById('current-date').innerText = `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')}`;

        // 원래 쓰시던 카운팅 코드(예: 카운터 API나 로컬스토리지 방식)를 여기에 넣으시면 됩니다.
        // 임시로 작동하는 로직을 넣어두었습니다.
        let today = localStorage.getItem('gw_today') || 0;
        let total = localStorage.getItem('gw_total') || 1535;
        
        today++; total++;
        localStorage.setItem('gw_today', today);
        localStorage.setItem('gw_total', total);
        
        document.getElementById('today-count').innerText = today;
        document.getElementById('total-count').innerText = total;
    </script>
</body>
</html>
