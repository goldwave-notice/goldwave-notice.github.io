<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD WAVE PREMIUM DASHBOARD</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff; /* 랑랑쌤 아이콘과 맞추기 위해 완전 흰색 고정 */
            font-family: 'Pretendard', sans-serif;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 1. 상단 헤더 섹션 */
        header {
            text-align: center;
            padding: 50px 20px 20px 20px;
            width: 100%;
        }

        /* 로고 이미지가 안 뜰 때를 대비해 세련된 원형 아이콘으로 대체 */
        .logo-circle {
            width: 60px;
            height: 60px;
            background: linear-gradient(145deg, #bf953f, #aa771c);
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: 900;
            font-size: 24px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(191, 149, 63, 0.3);
        }

        .brand-title {
            margin: 0;
            font-size: 32px;
            letter-spacing: 3px;
            color: #b38728; /* 선명한 골드톤 */
            font-weight: 900;
            text-transform: uppercase;
        }

        .status-bar {
            display: inline-flex;
            align-items: center;
            margin-top: 15px;
            padding: 6px 16px;
            background: #fdfaf0;
            border: 1px solid #f2e1ac;
            border-radius: 25px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #28a745;
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 8px rgba(40, 167, 69, 0.5);
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .info-row {
            margin-top: 20px;
            color: #999;
            font-size: 13px;
        }

        /* 2. 대시보드 그리드 (6개 아이콘) */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 20px 15px 60px 15px;
            max-width: 800px;
            width: 100%;
            box-sizing: border-box;
        }

        .nav-card {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            background: #fff;
            transition: all 0.25s ease;
            cursor: pointer;
            aspect-ratio: 546 / 402;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }

        .nav-card img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* 이미지 전체가 잘림 없이 보이도록 */
            display: block;
        }

        .nav-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(191, 149, 63, 0.15);
            border: 1px solid #bf953f;
        }

        /* 모바일 대응 */
        @media (max-width: 600px) {
            .dashboard-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .brand-title { font-size: 26px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-circle">G</div>
        
        <h1 class="brand-title">GOLD WAVE</h1>
        
        <div class="status-bar">
            <div class="status-dot"></div>
            <span style="color: #b38728; font-size: 11px; font-weight: 700; letter-spacing: 1px;">SYSTEM STATUS: ACTIVE</span>
        </div>

        <div class="info-row">
            <span id="display-date"></span>
            <span style="margin: 0 10px; opacity: 0.3;">|</span>
            <span>VIEWS: <span id="busuanzi_value_site_pv" style="color: #333; font-weight: bold;">0</span></span>
        </div>
    </header>

    <div class="dashboard-grid">
        <div class="nav-card" onclick="location.href='https://goldwave-notice.github.io/guide.html'">
            <img src="https://i.imgur.com/LLMMLE6.png" alt="사용설명서">
        </div>
        <div class="nav-card" onclick="location.href='https://goldwave-notice.github.io/profit.html'">
            <img src="https://i.imgur.com/EHzDZon.png" alt="수익현황">
        </div>
        <div class="nav-card" onclick="location.href='https://goldwave-notice.github.io/archive.html'">
            <img src="https://i.imgur.com/TKsOsPT.png" alt="아카이브">
        </div>
        <div class="nav-card" onclick="location.href='https://goldwave-notice.github.io/program.html'">
            <img src="https://i.imgur.com/Xles7rX.png" alt="프로그램">
        </div>
        <div class="nav-card" onclick="location.href='https://goldwave-notice.github.io/faq.html'">
            <img src="https://i.imgur.com/XCVCrRj.png" alt="FAQ">
        </div>
        <div class="nav-card" onclick="location.href='https://goldwave-notice.github.io/remote.html'">
            <img src="https://i.imgur.com/CYBeRLN.png" alt="원격지원">
        </div>
    </div>

    <script>
        const d = new Date();
        const formattedDate = `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')}`;
        document.getElementById('display-date').innerText = `📅 ${formattedDate}`;
    </script>

</body>
</html>
