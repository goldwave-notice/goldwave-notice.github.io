<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD WAVE PREMIUM DASHBOARD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    
    <style>
        /* 기본 레이아웃 */
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: 'Pretendard', -apple-system, sans-serif;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 1. 상단 히어로 섹션 (블랙 배경 + 쨍한 반짝이 가루) */
        .hero-section {
            width: 100%;
            /* 랑랑쌤이 원하신 블랙 바탕에 금가루가 팍팍 뿌려진 배경 */
            background: 
                linear-gradient(180deg, rgba(0, 0, 0, 0.8) 0%, rgba(10, 15, 25, 0.9) 100%),
                url('https://i.imgur.com/89.png'); /* 황금 파티클 이미지 */
            background-size: cover;
            background-position: bottom center;
            padding: 60px 0 50px 0;
            text-align: center;
            position: relative;
            overflow: hidden;
            border-bottom: 3px solid #bf953f; /* 선명한 골드 경계선 */
        }

        /* ⭐ 로고 애니메이션: 금색으로 빛나고 멈추고 반복 (Breathe) ⭐ */
        .premium-logo {
            width: 75px;
            height: auto;
            margin-bottom: 15px;
            position: relative;
            z-index: 10;
            animation: gold-glow 2.5s infinite ease-in-out;
        }

        @keyframes gold-glow {
            0% { filter: drop-shadow(0 0 5px rgba(191, 149, 63, 0.5)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.9)); transform: scale(1.08); }
            100% { filter: drop-shadow(0 0 5px rgba(191, 149, 63, 0.5)); transform: scale(1); }
        }

        /* ⭐ 랑랑쌤의 요청: 뿌연거 싹 잡은 쨍한 골드 텍스트 ⭐ */
        .brand-title {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            font-size: 46px;
            letter-spacing: 8px;
            font-weight: 900;
            text-transform: uppercase;
            font-style: italic;
            position: relative;
            z-index: 10;
            
            /* 쨍한 금속 질감 그라데이션 */
            background: linear-gradient(to bottom, #fff6a5 0%, #ffcc00 25%, #bf953f 50%, #fcf6ba 75%, #aa771c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            /* 쨍함을 위한 선명한 테두리 */
            -webkit-text-stroke: 1px rgba(212, 175, 55, 0.8);
            
            /* 선명한 그림자 (블러 0.3px로 최소화) */
            filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.6)) drop-shadow(0 4px 10px rgba(0, 0, 0, 0.7));
        }

        /* 슬로건 */
        .slogan {
            margin-top: 12px;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 800;
            color: #d4af37;
            letter-spacing: 4px;
            text-transform: uppercase;
            position: relative;
            z-index: 10;
        }

        /* 2. 하단 콘텐츠 영역 */
        .content-container {
            width: 100%;
            max-width: 950px;
            padding: 40px 20px 100px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 시스템 상태 (날짜 위 배치) */
        .status-badge {
            display: inline-flex;
            align-items: center;
            margin-bottom: 12px;
            padding: 6px 18px;
            background: #ffffff;
            border: 1px solid #bf953f;
            border-radius: 25px;
            box-shadow: 0 4px 12px rgba(191, 149, 63, 0.15);
        }

        .status-dot {
            width: 9px; height: 9px;
            background-color: #00ff00;
            border-radius: 50%;
            margin-right: 12px;
            box-shadow: 0 0 10px #00ff00;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .info-bar {
            margin-bottom: 40px;
            font-size: 14px;
            color: #888;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* 아이콘 그리드 */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
        }

        .nav-card {
            border-radius: 20px;
            background: #fff;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            aspect-ratio: 546 / 402;
            box-shadow: 0 6px 25px rgba(0,0,0,0.06);
            border: 1px solid #f2f2f2;
            overflow: hidden;
        }

        .nav-card img {
            width: 100%; height: 100%;
            object-fit: contain;
            display: block;
        }

        .nav-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 25px 50px rgba(191, 149, 63, 0.25);
            border: 2px solid #bf953f;
        }

        @media (max-width: 700px) {
            .dashboard-grid { grid-template-columns: repeat(2, 1fr); }
            .brand-title { font-size: 32px; letter-spacing: 4px; }
            .hero-section { padding: 40px 0 40px 0; }
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <img src="https://i.imgur.com/9VUt3sN.png" alt="Gold Wave Logo" class="premium-logo">
        
        <h1 class="brand-title">GOLD WAVE</h1>
        
        <div class="slogan">STAY AHEAD, RIGHT HERE.</div>
    </div>

    <div class="content-container">
        
        <div class="status-badge">
            <div class="status-dot"></div>
            <span style="color: #bf953f; font-size: 12px; font-weight: 900; letter-spacing: 1px;">SYSTEM STATUS: ACTIVE</span>
        </div>

        <div class="info-bar">
            <span id="date-display"></span>
            <span style="margin: 0 10px; opacity: 0.3;">|</span>
            <span>VIEWS: <span id="busuanzi_value_site_pv" style="color: #b38728; font-weight: 800;">0</span></span>
        </div>

        <div class="dashboard-grid">
            <div class="nav-card" onclick="location.href='https://goldwave-notice.github.io/guide.html'">
                <img src="https://i.imgur.com/C5xMVYm.png" alt="설명서">
            </div>
            <div class="nav-card" onclick="location.href='https://goldwave-notice.github.io/profit.html'">
                <img src="https://i.imgur.com/EHzDZon.png" alt="수익현황">
            </div>
            <div class="nav-card" onclick="location.href='https://goldwave-notice.github.io/archive.html'">
                <img src="https://i.imgur.com/TKsOsPT.png" alt="아카이브">
            </div>
            <div class="nav-card" onclick="location.href='https://goldwave-notice.github.io/program.html'">
                <img src="https://i.imgur.com/Xles7rX.png" alt="프로그램">
            </div>
            <div class="nav-card" onclick="location.href='https://goldwave-notice.github.io/faq.html'">
                <img src="https://i.imgur.com/XCVCrRj.png" alt="FAQ">
            </div>
            <div class="nav-card" onclick="location.href='https://goldwave-notice.github.io/remote.html'">
                <img src="https://i.imgur.com/CYBeRLN.png" alt="원격지원">
            </div>
        </div>
    </div>

    <script>
        // 오늘 날짜 자동 갱신
        const today = new Date();
        const y = today.getFullYear();
        const m = String(today.getMonth() + 1).padStart(2, '0');
        const d = String(today.getDate()).padStart(2, '0');
        document.getElementById('date-display').innerText = `📅 ${y}.${m}.${d}`;
    </script>

</body>
</html>
