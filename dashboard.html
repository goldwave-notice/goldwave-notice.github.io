<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD WAVE PREMIUM DASHBOARD</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: 'Pretendard', -apple-system, sans-serif;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 1. 상단 히어로 섹션 (랑랑쌤 제작 이미지 적용) */
        .hero-section {
            width: 100%;
            /* 랑랑쌤이 주신 이미지 주소 적용 */
            background-image: url('https://i.imgur.com/B3gB87i.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            /* 이미지 비율에 맞춰 높이 최적화 (300px~350px 추천) */
            height: 320px; 
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* 상태바를 하단 쪽에 배치 */
            align-items: center;
            padding-bottom: 40px; 
            box-sizing: border-box;
            border-bottom: 2px solid #bf953f; /* 하단 골드 라인 유지 */
        }

        /* 상태바 스타일 */
        .status-bar {
            display: inline-flex;
            align-items: center;
            padding: 6px 18px;
            background: rgba(0, 0, 0, 0.4); /* 이미지 위에서 잘 보이도록 반투명 배경 */
            border: 1px solid rgba(191, 149, 63, 0.6);
            border-radius: 30px;
            backdrop-filter: blur(4px);
        }

        .status-dot {
            width: 9px; height: 9px;
            background-color: #00ff00;
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 10px #00ff00;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.6; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 2. 하단 콘텐츠 섹션 */
        .content-container {
            width: 100%;
            max-width: 950px;
            padding: 30px 20px 80px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .info-bar {
            margin-bottom: 30px;
            font-size: 14px;
            color: #888;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
        }

        .nav-card {
            border-radius: 20px;
            background: #fff;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            aspect-ratio: 546 / 402;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            border: 1px solid #f2f2f2;
            overflow: hidden;
        }

        .nav-card img {
            width: 100%; height: 100%;
            object-fit: contain;
            display: block;
        }

        .nav-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(191, 149, 63, 0.2);
            border: 1.5px solid #bf953f;
        }

        /* 모바일 대응 */
        @media (max-width: 700px) {
            .dashboard-grid { grid-template-columns: repeat(2, 1fr); }
            .hero-section { height: 220px; padding-bottom: 25px; }
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <div class="status-bar">
            <div class="status-dot"></div>
            <span style="color: #bf953f; font-size: 11px; font-weight: 900; letter-spacing: 1.5px;">SYSTEM STATUS: ACTIVE</span>
        </div>
    </div>

    <div class="content-container">
        <div class="info-bar">
            <span id="date-display"></span>
            <span style="margin: 0 15px; opacity: 0.3;">|</span>
            <span>VIEWS: <span id="busuanzi_value_site_pv" style="color: #b38728; font-weight: 800;">0</span></span>
        </div>

        <div class="dashboard-grid">
            <div class="nav-card" onclick="location.href='https://goldwave-notice.github.io/guide.html'"><img src="https://i.imgur.com/C5xMVYm.png"></div>
            <div class="nav-card" onclick="location.href='https://goldwave-notice.github.io/profit.html'"><img src="https://i.imgur.com/EHzDZon.png"></div>
            <div class="nav-card" onclick="location.href='https://goldwave-notice.github.io/archive.html'"><img src="https://i.imgur.com/TKsOsPT.png"></div>
            <div class="nav-card" onclick="location.href='https://goldwave-notice.github.io/program.html'"><img src="https://i.imgur.com/Xles7rX.png"></div>
            <div class="nav-card" onclick="location.href='https://goldwave-notice.github.io/faq.html'"><img src="https://i.imgur.com/XCVCrRj.png"></div>
            <div class="nav-card" onclick="location.href='https://goldwave-notice.github.io/remote.html'"><img src="https://i.imgur.com/CYBeRLN.png"></div>
        </div>
    </div>

    <script>
        // 오늘 날짜 출력
        const today = new Date();
        const y = today.getFullYear();
        const m = String(today.getMonth() + 1).padStart(2, '0');
        const d = String(today.getDate()).padStart(2, '0');
        document.getElementById('date-display').innerText = `📅 ${y}.${m}.${d}`;
    </script>

</body>
</html>
