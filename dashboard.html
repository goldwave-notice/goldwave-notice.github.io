<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD WAVE PREMIUM DASHBOARD</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0d11; /* 프리미엄 다크 네이비 배경 */
            font-family: 'Pretendard', sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 1. 상단 헤더 섹션 (로고 포함) */
        header {
            text-align: center;
            padding: 50px 20px 30px 20px;
            width: 100%;
        }

        .logo-img {
            width: 70px; /* 로고 사이즈 */
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 15px rgba(191, 149, 63, 0.5)); /* 로고 후광 효과 */
        }

        .brand-title {
            margin: 0;
            font-size: 34px;
            letter-spacing: 4px;
            /* 리얼 골드 그라데이션 효과 */
            background: linear-gradient(145deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            text-transform: uppercase;
        }

        .status-bar {
            display: inline-flex;
            align-items: center;
            margin-top: 15px;
            padding: 6px 16px;
            background: rgba(191, 149, 63, 0.08);
            border: 1px solid rgba(191, 149, 63, 0.3);
            border-radius: 25px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #00ff00;
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 10px #00ff00;
            animation: blink 2s infinite; /* 실시간 작동 느낌 */
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .info-row {
            margin-top: 25px;
            color: #777;
            font-size: 13px;
            letter-spacing: 1px;
        }

        /* 2. 대시보드 그리드 (6개 아이콘) */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* PC: 3열 */
            gap: 15px;
            padding: 20px 20px 60px 20px;
            max-width: 900px;
            width: 95%;
        }

        .nav-card {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
            aspect-ratio: 546 / 402; /* 랑랑쌤 전용 황금비율 */
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .nav-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 45px rgba(191, 149, 63, 0.3);
            border: 1px solid rgba(191, 149, 63, 0.5);
        }

        /* 모바일 대응 (화면 작아지면 2열) */
        @media (max-width: 650px) {
            .dashboard-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .brand-title { font-size: 26px; }
            .logo-img { width: 60px; }
        }
    </style>
</head>
<body>

    <header>
        <img src="https://i.imgur.com/kS9X7vG.png" alt="Gold Wave Logo" class="logo-img">
        
        <h1 class="brand-title">GOLD WAVE</h1>
        
        <div class="status-bar">
            <div class="status-dot"></div>
            <span style="color: #bf953f; font-size: 12px; font-weight: 700; letter-spacing: 1.5px;">SYSTEM STATUS: ACTIVE</span>
        </div>

        <div class="info-row">
            <span id="display-date" style="color: #eee;"></span>
