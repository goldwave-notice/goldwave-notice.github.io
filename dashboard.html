<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD WAVE PREMIUM DASHBOARD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    
    <style>
        /* 기본 설정 */
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff; /* 하단 아이콘용 순백색 배경 */
            font-family: 'Pretendard', -apple-system, sans-serif;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 1. 상단 히어로 섹션 (다크 네이비 투톤 + 반짝이 안개) */
        .hero-section {
            width: 100%;
            /* 상단은 어둡고 하단으로 갈수록 반짝이가 퍼지는 그라데이션 배경 */
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            padding: 70px 0 100px 0;
            text-align: center;
            position: relative;
            overflow: hidden;
            border-bottom: 2px solid #bf953f; /* 경계선 골드 라인 */
        }

        /* 랑랑쌤이 요청하신 '황금빛 반짝이 안개' 효과 (코딩으로 구현) */
        .hero-section::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 120px;
            /* 랑랑쌤이 원하신 반짝이는 입자 느낌의 안개 그라데이션 */
            background: radial-gradient(circle at center, rgba(255, 215, 0, 0.2) 0%, rgba(191, 149, 63, 0.1) 40%, rgba(255, 255, 255, 0) 80%);
            filter: blur(10px);
            pointer-events: none;
        }

        .premium-logo {
            width: 80px;
            height: auto;
            margin-bottom: 15px;
            position: relative;
            z-index: 10;
            filter: drop-shadow(0 0 15px rgba(191, 149, 63, 0.6));
        }

        /* ⭐ 랑랑쌤의 요청: 뚱뚱하고 환하게 번져보이는 럭셔리 골드 텍스트 ⭐ */
        .brand-title {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            font-size: 44px;
            letter-spacing: 8px; /* 시원한 자간 */
            font-weight: 900;
            text-transform: uppercase;
            font-style: italic; /* 역동적인 기울임 */
            position: relative;
            z-index: 10;
            
            /* 리얼 골드 입체 그라데이션 */
            background: linear-gradient(to bottom, #fcf6ba 0%, #bf953f 40%, #fcf6ba 60%, #bf953f 85%, #aa771c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            /* 미세한 테두리로 선명함 유지 */
            -webkit-text-stroke: 0.5px rgba(212, 175, 55, 0.4);
            
            /* 환하게 빛을 발산하며 번져보이는 후광 효과 */
            filter: drop-shadow(0 0 12px rgba(184, 134, 11, 0.7)) blur(0.3px);
        }

        .status-bar {
            display: inline-flex;
            align-items: center;
            margin-top: 25px;
            padding: 8px 22px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(191, 149, 63, 0.5);
            border-radius: 40px;
            position: relative;
            z-index: 10;
        }

        .status-dot {
            width: 10px; height: 10px;
            background-color: #00ff00;
            border-radius: 50%;
            margin-right: 12px;
            box-shadow: 0 0 12px #00ff00;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.6; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 2. 하단 콘텐츠 섹션 (화이트 배경) */
        .content-container {
            width: 100%;
            max-width: 950px;
            padding: 40px 20px 100px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .info-bar {
            margin-bottom: 40px;
            font-size: 14px;
            color: #888;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
        }

        .nav-card {
            border-radius: 20px;
            background: #fff;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            aspect-ratio: 546 / 402;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            border: 1px solid #f0f0f0;
            overflow: hidden;
        }

        .nav-card img {
            width: 100%; height: 100%;
            object-fit: contain;
            display: block;
        }

        .nav-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 25px 50px rgba(191, 149, 63, 0.2);
            border: 1.5px solid #bf953f;
        }

        /* 모바일 대응 */
        @media (max-width: 700px) {
            .dashboard-grid { grid-template-columns: repeat(2, 1fr); }
            .brand-title { font-size: 30px; letter-spacing: 4px; }
            .hero-section { padding: 50px 0 60px 0; }
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <img src="https://i.imgur.com/9VUt3sN.png" alt="Logo" class="premium-logo">
        
        <h1 class="brand-title">GOLD WAVE</h1>
        
        <div class="status-bar">
            <div class="status-dot"></div>
            <span style="color: #bf953f; font-size: 13px; font-weight: 900; letter-spacing: 2px;">SYSTEM STATUS: ACTIVE</span>
        </div>
    </div>

    <div class="content-container">
        <div class="info-bar">
            <span id="date-display"></span>
            <span style="margin: 0 15px; opacity: 0.3;">|</span>
            <span>VIEWS: <span id="busuanzi_value_site_pv" style="color: #b38728; font-weight: 800;">0</span></span>
        </div>

        <div class="dashboard-grid">
            <div class="nav-card" onclick="location.href='https://goldwave-notice.github.io/guide.html'">
                <img src="https://i.imgur.com/C5xMVYm.png" alt="설명서">
            </div>
            <div class="nav-card" onclick="location.href='https://goldwave-notice.github.io/profit.html'">
                <img src="https://i.imgur.com/EHzDZon.png" alt="수익현황">
            </div>
            <div class="nav-card" onclick="location.href='https://goldwave-notice.github.io/archive.html'">
                <img src="https://i.imgur.com/TKsOsPT.png" alt="아카이브">
            </div>
            <div class="nav-card" onclick="location.href='https://goldwave-notice.github.io/program.html'">
                <img src="https://i.imgur.com/Xles7rX.png" alt="프로그램">
            </div>
            <div class="nav-card" onclick="location.href='https://goldwave-notice.github.io/faq.html'">
                <img src="https://i.imgur.com/XCVCrRj.png" alt="FAQ">
            </div>
            <div class="nav-card" onclick="location.href='https://goldwave-notice.github.io/remote.html'">
                <img src="https://i.imgur.com/CYBeRLN.png" alt="원격지원">
            </div>
        </div>
    </div>

    <script>
        // 오늘 날짜 자동 갱신 스크립트
        const today = new Date();
        const y = today.getFullYear();
        const m = String(today.getMonth() + 1).padStart(2, '0');
        const d = String(today.getDate()).padStart(2, '0');
        document.getElementById('date-display').innerText = `📅 ${y}.${m}.${d}`;
    </script>

</body>
</html>
