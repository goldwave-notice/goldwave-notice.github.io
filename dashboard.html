<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD WAVE PREMIUM DASHBOARD</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff; /* 하단은 깨끗한 화이트 */
            font-family: 'Pretendard', sans-serif;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 1. 상단 투톤 헤더 (다크 네이비 배경) */
        .hero-section {
            width: 100%;
            background: linear-gradient(to bottom, #0f172a, #1e293b); /* 럭셔리 다크 네이비 */
            padding: 60px 0 80px 0;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* 랑랑쌤이 V체크하신 반짝이 효과 (Particle) */
        .hero-section::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            /* 경계선 부분에 황금빛 반짝이 그라데이션 */
            background: radial-gradient(circle, rgba(191,149,63,0.4) 0%, rgba(255,255,255,0) 70%);
            filter: blur(10px);
        }

        /* 별빛 반짝이 효과 추가 */
        .sparkles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(#bf953f 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.2;
        }

        .premium-logo {
            width: 70px;
            height: auto;
            margin-bottom: 15px;
            position: relative;
            z-index: 10;
            filter: drop-shadow(0 0 15px rgba(191,149,63,0.5));
        }

        .brand-title {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            font-size: 44px;
            letter-spacing: 8px; /* 시원한 자간 */
            font-weight: 900;
            text-transform: uppercase;
            font-style: italic;
            position: relative;
            z-index: 10;
            
            /* 입체 골드 텍스트 */
            background: linear-gradient(to bottom, #fcf6ba 0%, #bf953f 30%, #fcf6ba 50%, #bf953f 80%, #aa771c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            -webkit-text-stroke: 0.5px rgba(212, 175, 55, 0.5);
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
        }

        .status-bar {
            display: inline-flex;
            align-items: center;
            margin-top: 25px;
            padding: 6px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(191, 149, 63, 0.4);
            border-radius: 35px;
            position: relative;
            z-index: 10;
        }

        .status-dot {
            width: 10px; height: 10px;
            background-color: #28a745;
            border-radius: 50%;
            margin-right: 12px;
            box-shadow: 0 0 10px #28a745;
            animation: breathe 2s infinite;
        }

        @keyframes breathe {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* 2. 하단 대시보드 그리드 (화이트 배경 위) */
        .content-section {
            width: 100%;
            max-width: 950px;
            padding
