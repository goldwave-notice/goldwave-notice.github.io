<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOLD WAVE PREMIUM DASHBOARD</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    body {
      margin: 0; background-color: #0b0d11; font-family: 'Pretendard', sans-serif; color: #e0e0e0;
      display: flex; flex-direction: column; align-items: center; min-height: 100vh;
      background: radial-gradient(circle at center, #161a21 0%, #0b0d11 100%); /* 딥 네이비 그라데이션 */
    }

    /* 🏛️ 헤더 섹션 - 웅장한 타이포그래피 */
    header {
      width: 100%; max-width: 900px; padding: 60px 20px; text-align: center;
    }
    .logo {
      font-size: 36px; font-weight: 900; letter-spacing: 6px; text-transform: uppercase;
      background: linear-gradient(145deg, #bf953f 0%, #ffffff 50%, #bf953f 100%); /* 골드-화이트 3D 그라데이션 */
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-shadow: 0 5px 15px rgba(191,149,63,0.3);
    }
    .sub-logo { color: #bf953f; font-size: 13px; margin-top: 15px; letter-spacing: 3px; font-weight: 700; opacity: 0.8; }

    .container { width: 100%; max-width: 900px; padding: 0 20px 80px; box-sizing: border-box; }

    /* 🗞️ LATEST REPORT - 웅장한 3D 메탈 카드 */
    .main-news-section { margin-bottom: 50px; }
    .section-title {
      color: #fff; font-size: 16px; font-weight: 800; margin-bottom: 20px; text-align: left;
      border-left: 4px solid #bf953f; padding-left: 15px; letter-spacing: 2px;
    }
    
    .featured-card {
      background: linear-gradient(145deg, #161a21 0%, #0b0d11 100%); /* 차가운 메탈 재질감 */
      border-radius: 25px; border: 1px solid rgba(191,149,63,0.15); /* 은은한 골드 테두리 */
      padding: 30px; display: flex; align-items: center; text-decoration: none; transition: 0.3s;
      box-shadow: 0 20px 50px rgba(0,0,0,0.7), inset 0 0 30px rgba(191,149,63,0.05); /* 내부광 효과 */
    }
    .featured-card:hover { transform: translateY(-8px) scale(1.01); border-color: rgba(191,149,63,0.6); box-shadow: 0 25px 60px rgba(0,0,0,0.8), inset 0 0 40px rgba(191,149,63,0.1); }
    .featured-thumb { width: 150px; height: 150px; border-radius: 15px; object-fit: cover; margin-right: 30px; border: 2px solid rgba(191,149,63,0.1); }
    .featured-info { flex: 1; text-align: left; }
    .featured-date { color: #bf953f; font-size: 12px; font-weight: 800; margin-bottom: 8px; display: block; letter-spacing: 1px; }
    
    .featured-title {
      color: #fff; font-size: 24px; font-weight: 700; line-height: 1.4; word-break: keep-all;
      background: linear-gradient(145deg, #ffffff 0%, #bf953f 100%); /* 화이트-골드 3D 그라데이션 */
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    /* 🎛️ DASHBOARD MENU - 리얼 3D 렌더링 그리드 */
    .menu-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 30px;
    }
    .menu-item {
      background: linear-gradient(145deg, #111419 0%, #0b0d11 100%);
      border: 1px solid rgba(255,255,255,0.03); border-radius: 20px;
      padding: 40px 25px; text-decoration: none; text-align: center; transition: 0.3s;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.01);
    }
    .menu-item:hover { background: rgba(191,149,63,0.08); border-color: rgba(191,149,63,0.3); transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0,0,0,0.6), inset 0 0 30px rgba(191,149,63,0.03); }
    
    .menu-icon { font-size: 32px; margin-bottom: 15px; display: block; opacity: 0.8; }
    
    .menu-text {
      color: #fff; font-size: 16px; font-weight: 800; letter-spacing: 2px;
      background: linear-gradient(145deg, #bf953f 0%, #ffffff 50%, #bf953f 100%); /* 헤더와 동일한 3D 그라데이션 */
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .menu-sub { color: #777; font-size: 12px; margin-top: 8px; font-weight: 600; }

    .footer { margin-top: auto; padding: 60px 40px; font-size: 13px; color: #444; letter-spacing: 1px; font-weight: 600; }
  </style>
</head>
<body>

  <header>
    <div class="logo">GOLD WAVE</div>
    <div class="sub-logo">PREMIUM INVESTMENT REPORT</div>
  </header>

  <div class="container">
    
    <section class="main-news-section">
      <div class="section-title">LATEST REPORT</div>
      <a href="260402.html" class="featured-card">
        <img src="https://i.imgur.com/EskBuKu.jpeg" class="featured-thumb" alt="오늘뉴스">
        <div class="featured-info">
          <span class="featured-date">26.04.02 #03</span>
          <div class="featured-title">금 4,600달러 붕괴...<br>하루새 시총 1,500조 쇼크</div>
        </div>
      </a>
    </section>

    <div class="section-title">DASHBOARD MENU</div>
    <div class="menu-grid">
      <a href="archive.html" class="menu-item">
        <span class="menu-icon">📁</span>
        <span class="menu-text">REPORT ARCHIVE</span>
        <span class="menu-sub">지난 뉴스 전체 보기</span>
      </a>
      
      <div class="menu-item" style="opacity: 0.4;">
        <span class="menu-icon">🤖</span>
        <span class="menu-text">AI SIGNALS</span>
        <span class="menu-sub">준비 중</span>
      </div>

      <div class="menu-item" style="opacity: 0.4;">
        <span class="menu-icon">📈</span>
        <span class="menu-text">MARKET DATA</span>
        <span class="menu-sub">준비 중</span>
      </div>

      <div class="menu-item" style="opacity: 0.4;">
        <span class="menu-icon">📢</span>
        <span class="menu-text">NOTICE</span>
        <span class="menu-sub">준비 중</span>
      </div>
    </div>

    <div class="footer">
      © GOLD WAVE. All rights reserved.
    </div>
  </div>

  <div style="text-align: center; padding-bottom: 60px;">
    <span style="font-size: 12px; color: #1c2128; letter-spacing: 1px; font-weight: 600;">
      TOTAL VISITORS : 
      <span id="busuanzi_value_site_pv" style="margin-left: 8px; opacity: 0.6;">0</span>
    </span>
  </div>
  <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>

</body>
</html>
