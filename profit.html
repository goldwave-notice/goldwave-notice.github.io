<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOLD WAVE REAL-TIME PROFIT</title>
  <style>
    /* 1. 프리미엄 Pretendard 폰트 */
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    body {
      margin: 0; padding: 0;
      background-color: #0b0d11; /* 랑랑's 시그니처 다크 네이비 */
      font-family: 'Pretendard', sans-serif;
      color: #e0e0e0;
      display: flex; flex-direction: column; align-items: center;
      padding-bottom: 120px; /* 하단 버튼 여백 확보 */
    }

    .container {
      width: 100%; max-width: 850px;
      padding: 40px 20px;
      box-sizing: border-box;
    }

    /* 2. 로고 & 타이틀 정렬 (로고 교체 완료) */
    .header-box {
      display: flex;
      align-items: center;
      margin-bottom: 40px;
      border-left: 6px solid #bf953f;
      padding-left: 20px;
    }
    .brand-logo {
      width: 45px; height: auto;
      margin-right: 15px;
      filter: drop-shadow(0 0 5px rgba(191, 149, 63, 0.5));
    }
    h1 {
      color: #bf953f; font-size: 24px; margin: 0;
      line-height: 1.2; letter-spacing: -0.5px;
    }

    /* 3. 최상단 공지: 부활절 휴장 안내 (최신순 배치 원칙) */
    .holiday-notice {
      text-align: center;
      padding: 30px;
      background: rgba(191, 149, 63, 0.05);
      border: 1px dashed rgba(191, 149, 63, 0.4);
      border-radius: 20px;
      margin-bottom: 50px;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
    }
    .holiday-notice p { color: #fcf6ba; font-size: 15px; margin: 0; line-height: 1.7; }

    /* 4. 수익 섹션 (최신순 배치) */
    .profit-section {
      margin-bottom: 60px;
      background: rgba(255, 255, 255, 0.02);
      padding: 25px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .date-badge {
      display: inline-block;
      background: linear-gradient(135deg, #bf953f, #fcf6ba);
      color: #000; padding: 5px 15px;
      border-radius: 30px; font-weight: 800; font-size: 13px;
      margin-bottom: 20px;
    }

    /* 5. ⭐ 수익 그래프 돋보기 효과 (JavaScript 필수 CSS) ⭐ */
    .magnify-container {
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
      cursor: zoom-in; /* 돋보기 아이콘 */
    }
    .profit-img {
      width: 100%; border-radius: 12px;
      display: block;
    }
    /* 돋보기 렌즈 스타일 (골드 후광 효과) */
    .magnify-lens {
      position: absolute;
      border: 3px solid #bf953f; /* 미세한 골드 테두리 */
      border-radius: 50%; /* 둥근 렌즈 */
      width: 150px; height: 150px; /* 돋보기 크기 */
      box-shadow: 0 10px 30px rgba(0,0,0,0.8), 0 0 15px rgba(191, 149, 63, 0.3);
      display: none; /* 마우스 올리기 전엔 숨김 */
      pointer-events: none; /* 렌즈는 마우스 이벤트를 막지 않음 */
      background-repeat: no-repeat;
    }

    /* 6. 하단 플로팅 버튼 (dashboard.html 연결 완료) */
    .back-home {
      position: fixed;
      bottom: 30px;
      background: linear-gradient(135deg, #bf953f, #aa771c);
      color: #000;
      padding: 14px 40px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 800;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      transition: 0.3s;
      z-index: 1000;
    }
    .back-home:hover { transform: translateY(-5px) scale(1.05); background: #fcf6ba; }
  </style>
</head>
<body>

  <div class="container">
    <div class="header-box">
      <img src="https://i.imgur.com/9VUt3sN.png" alt="Gold Wave Logo" class="brand-logo">
      <h1>GOLD WAVE<br>STRATEGY PROFIT REPORT</h1>
    </div>

    <div class="holiday-notice">
      <p>⚠️ 2026. 04. 03 - 04. 05<br>부활절 연휴 글로벌 시장 휴장으로 인한<br>AI 자동 트레이딩 시스템 일시 정지 (리스크 관리)</p>
    </div>

    <div class="profit-section">
      <div class="date-badge">2026. 04. 02 (THU)</div>
      <div class="magnify-container" id="magnify-4-2">
        <img src="https://i.imgur.com/ImllwXt.jpeg" alt="4/2 수익현황" class="profit-img">
        <div class="magnify-lens"></div>
      </div>
    </div>

    <div class="profit-section">
      <div class="date-badge">2026. 04. 01 (WED)</div>
      <div class="magnify-container" id="magnify-4-1">
        <img src="https://i.imgur.com/RfAd7zA.jpeg" alt="4/1 수익현황" class="profit-img">
        <div class="magnify-lens"></div>
      </div>
    </div>

  </div>

  <a href="dashboard.html" class="back-home">🏠 메인 대시보드</a>

  <script>
    function enableMagnify(containerId) {
      const container = document.getElementById(containerId);
      const img = container.querySelector('.profit-img');
      const lens = container.querySelector('.magnify-lens');

      // 돋보기창 배경으로 원본 이미지를 설정
      lens.style.backgroundImage = `url('${img.src}')`;

      // ⭐ 돋보기 배율 설정 (2.5배 확대) ⭐
      const zoom = 2.5;

      container.addEventListener('mousemove', (e) => {
        lens.style.display = 'block';

        const { left, top, width, height } = container.getBoundingClientRect();
        const x = e.clientX - left;
        const y = e.clientY - top;

        // 렌즈 위치 조절
        lens.style.left = `${x - lens.offsetWidth / 2}px`;
        lens.style.top = `${y - lens.offsetHeight / 2}px`;

        // ⭐ 돋보기 배경 이미지 위치 조절 (확대된 이미지의 특정 구간을 보여줌) ⭐
        // 랑랑쌤이 원하시는 네모 박스 구간을 확대해서 보여주는 핵심 로직입니다!
        lens.style.backgroundPosition = `-${x * zoom - lens.offsetWidth / 2}px -${y * zoom - lens.offsetHeight / 2}px`;
        lens.style.backgroundSize = `${width * zoom}px ${height * zoom}px`;
      });

      container.addEventListener('mouseleave', () => {
        lens.style.display = 'none';
      });
    }

    // ⭐ 4/2와 4/1 각 섹션에 돋보기 기능 활성화 ⭐
    enableMagnify('magnify-4-2');
    enableMagnify('magnify-4-1');
  </script>

</body>
</html>
