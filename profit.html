<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOLD WAVE REAL-TIME PROFIT</title>
  <style>
    /* 1. 프리미엄 Pretendard 폰트 */
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    body {
      margin: 0; padding: 0;
      background-color: #0b0d11; 
      font-family: 'Pretendard', sans-serif;
      color: #e0e0e0;
      display: flex; flex-direction: column; align-items: center;
      padding-bottom: 120px;
    }

    .container {
      width: 100%; max-width: 900px;
      padding: 40px 20px;
      box-sizing: border-box;
    }

    .header-box {
      display: flex;
      align-items: center;
      margin-bottom: 40px;
      border-left: 6px solid #bf953f;
      padding-left: 20px;
    }
    .brand-logo {
      width: 45px; height: auto;
      margin-right: 15px;
      filter: drop-shadow(0 0 5px rgba(191, 149, 63, 0.5));
    }
    h1 {
      color: #bf953f; font-size: 24px; margin: 0;
      line-height: 1.2; letter-spacing: -0.5px;
    }

    .holiday-notice {
      text-align: center;
      padding: 30px;
      background: rgba(191, 149, 63, 0.05);
      border: 1px dashed rgba(191, 149, 63, 0.4);
      border-radius: 20px;
      margin-bottom: 50px;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
    }
    .holiday-notice p { color: #fcf6ba; font-size: 15px; margin: 0; line-height: 1.7; }

    .profit-section {
      margin-bottom: 60px;
      background: rgba(255, 255, 255, 0.02);
      padding: 20px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: border 0.3s ease;
    }
    .profit-section:hover {
      border: 1px solid rgba(191, 149, 63, 0.4);
    }

    .date-badge {
      display: inline-block;
      background: linear-gradient(135deg, #bf953f, #fcf6ba);
      color: #000; padding: 5px 15px;
      border-radius: 30px; font-weight: 800; font-size: 13px;
      margin-bottom: 20px;
    }

    .magnify-container {
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      /* ⭐ 여기만 zoom-in으로 바꿨습니다! ⭐ */
      cursor: zoom-in; 
      background-color: #000;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
    }

    .profit-img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.15s ease-out, filter 0.3s ease;
      transform-origin: center;
    }

    .back-home {
      position: fixed;
      bottom: 30px;
      background: linear-gradient(135deg, #bf953f, #aa771c);
      color: #000;
      padding: 14px 40px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 800;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      transition: 0.3s;
      z-index: 1000;
    }
    .back-home:hover { transform: translateY(-5px) scale(1.05); background: #fcf6ba; }
  </style>
</head>
<body>

  <div class="container">
    <div class="header-box">
      <img src="https://i.imgur.com/9VUt3sN.png" alt="Gold Wave Logo" class="brand-logo">
      <h1>GOLD WAVE<br>STRATEGY PROFIT REPORT</h1>
    </div>

   <div class="profit-section">
      <div class="date-badge">2026. 04. 06 (MON)</div>
      <div class="magnify-container" id="zoom-4-6">
        <img src="https://i.imgur.com/XATyzP8.jpeg" alt="4/6 수익현황" class="profit-img">
      </div>
    </div>

    <div class="holiday-notice">
      <p>⚠️ 2026. 04. 03 - 04. 05<br>부활절 연휴 글로벌 시장 휴장으로 인한<br>AI 자동 트레이딩 시스템 일시 정지 (리스크 관리)</p>
    </div>

    <div class="profit-section">
      <div class="date-badge">2026. 04. 02 (THU)</div>
      <div class="magnify-container" id="zoom-4-2">
        <img src="https://i.imgur.com/ImllwXt.jpeg" alt="4/2 수익현황" class="profit-img">
      </div>
    </div>

    <div class="profit-section">
      <div class="date-badge">2026. 04. 01 (WED)</div>
      <div class="magnify-container" id="zoom-4-1">
        <img src="https://i.imgur.com/RfAd7zA.jpeg" alt="4/1 수익현황" class="profit-img">
      </div>
    </div>
  </div>

  <a href="dashboard.html" class="back-home">🏠 홈</a>

  <script>
    function enableWideZoom(containerId) {
      const container = document.getElementById(containerId);
      const img = container.querySelector('.profit-img');

      container.addEventListener('mousemove', (e) => {
        const { left, top, width, height } = container.getBoundingClientRect();
        const x = ((e.clientX - left) / width) * 100;
        const y = ((e.clientY - top) / height) * 100;

        img.style.transformOrigin = `${x}% ${y}%`;
        img.style.transform = "scale(2)";
        img.style.filter = "brightness(1.1)";
      });

      container.addEventListener('mouseleave', () => {
        img.style.transformOrigin = "center";
        img.style.transform = "scale(1)";
        img.style.filter = "brightness(1)";
      });
    }

    enableWideZoom('zoom-4-2');
    enableWideZoom('zoom-4-1');
  </script>

</body>
</html>
