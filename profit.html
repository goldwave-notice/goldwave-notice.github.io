  <title>GOLD WAVE - 수익 현황</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    /* 🔴 배경은 유지하되 모바일 축소를 위해 최소 너비 제거 */
    html, body {
      margin: 0; padding: 0;
      background-color: #0b0d11; 
      font-family: 'Pretendard', sans-serif;
      color: #e0e0e0;
      overflow-x: hidden;
    }

    body {
      display: flex; flex-direction: column; align-items: center;
      padding-bottom: 120px;
    }

    /* 🔴 상단 고정 헤더: 모바일 화면 너비에 맞게 100%로 수정 */
    .header-sticky { 
        position: fixed; top: 0; left: 0; width: 100%;
        background: rgba(26, 29, 35, 0.95); 
        border-bottom: 1px solid rgba(191, 149, 63, 0.3); 
        z-index: 1000; padding: 15px 0; 
        text-align: center; backdrop-filter: blur(10px); 
    }
    .header-title { font-size: 16px; font-weight: 800; color: #bf953f; letter-spacing: 1px; }

    .back-nav {
        position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
        text-decoration: none; color: #bf953f; font-size: 24px;
        transition: 0.3s;
    }

    /* 🔴 컨테이너: PC 규격을 유지하면서 모바일 화면 비율에 맞춰 자동 축소 */
    .container {
      width: 1200px;
      transform: scale(calc(100vw / 1200)); 
      transform-origin: top center;
      margin-top: 100px; 
      display: flex; flex-direction: column; align-items: center;
      /* 축소로 생기는 하단 공백 제거 */
      margin-bottom: calc(-1200px + 100vh);
    }

    .header-box-centered { text-align: center; margin-bottom: 70px; width: 100%; }
    .brand-logo { width: 65px; height: auto; margin-bottom: 20px; filter: drop-shadow(0 0 8px rgba(191, 149, 63, 0.5)); }
    .header-text h1 { color: #bf953f; font-size: 36px; margin: 0; font-weight: 800; letter-spacing: -1px; }
    .header-text p { color: #aaa; font-size: 18px; margin-top: 12px; font-weight: 700; }

    .holiday-notice {
      width: 100%; text-align: center; padding: 40px; background: rgba(191, 149, 63, 0.05);
      border: 1px dashed rgba(191, 149, 63, 0.4); border-radius: 25px; margin-bottom: 60px; box-sizing: border-box;
    }
    .holiday-notice p { color: #fcf6ba; font-size: 18px; margin: 0; line-height: 1.8; }

    .profit-section {
      width: 100%; margin-bottom: 80px; background: rgba(255, 255, 255, 0.02);
      padding: 30px; border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.05); box-sizing: border-box;
    }
    .date-badge { display: inline-block; background: linear-gradient(135deg, #bf953f, #fcf6ba); color: #000; padding: 8px 20px; border-radius: 40px; font-weight: 800; font-size: 16px; margin-bottom: 25px; }
    .magnify-container { position: relative; overflow: hidden; border-radius: 15px; cursor: zoom-in; background-color: #000; box-shadow: 0 15px 50px rgba(0,0,0,0.8); }
    .profit-img { width: 100%; height: auto; display: block; transition: transform 0.15s ease-out; transform-origin: center; }
  </style>
</head>
<body>

  <div class="header-sticky">
      <a href="dashboard-new.html" class="back-nav"><i class="fa-solid fa-arrow-left"></i></a>
      <div class="header-title">GOLD WAVE 수익현황</div>
  </div>

  <div class="container">

    <div class="profit-section">
      <div class="date-badge">2026. 04. 15 (WED)</div>
      <div class="magnify-container" id="zoom-4-15">
        <img src="https://i.imgur.com/BAIC86A.jpeg" alt="4/15 수익현황" class="profit-img">

    </div>

    <div class="profit-section">
      <div class="date-badge">2026. 04. 14 (TUE)</div>

        <img src="https://i.imgur.com/cF9vveQ.jpeg" alt="4/14 수익현황" class="profit-img">
      </div>
    </div>

    <div class="profit-section">
      <div class="date-badge">2026. 04. 13 (MON)</div>

    <div class="profit-section">

      </div>
    </div>
  </div>

  <script>
    function enableWideZoom(containerId) {
      const container = document.getElementById(containerId);
      if(!container) return;
      const img = container.querySelector('.profit-img');

      container.addEventListener('mousemove', (e) => {
        const { left, top, width, height } = container.getBoundingClientRect();
        const x = ((e.clientX - left) / width) * 100;
        const y = ((e.clientY - top) / height) * 100;
        img.style.transformOrigin = `${x}% ${y}%`;
        img.style.transform = "scale(1.8)";
      });

      container.addEventListener('mouseleave', () => {
        img.style.transformOrigin = "center";
        img.style.transform = "scale(1)";
      });
    }

    enableWideZoom('zoom-4-16');    
    enableWideZoom('zoom-4-15');    
    enableWideZoom('zoom-4-14');
    enableWideZoom('zoom-4-13');
    enableWideZoom('zoom-4-10');
    enableWideZoom('zoom-4-6');
    enableWideZoom('zoom-4-2');
    enableWideZoom('zoom-4-1');
  </script>
