        .container { width: 92%; max-width: 900px; margin-top: 30px; }

            display: flex; justify-content: center; align-items: center; z-index: 10000;

        .video-clipper {
            width: 100%;
            height: 380px;

            border-radius: 12px;
            border: 1px solid #333;
            background: #000;
            position: relative;
            margin-bottom: 25px;
        }
        .video-clipper video {
            width: 100%;
            height: auto;

            left: 0;
        }

        .brand-video-card video { width: 100%; border-radius: 12px; display: block; border: 1px solid rgba(255,255,255,0.05); }
