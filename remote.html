<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD WAVE - REMOTE SUPPORT</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { margin: 0; padding: 0; background-color: #0b0d11; font-family: 'Pretendard', sans-serif; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; padding-bottom: 120px; }
        
        .container { width: 92%; max-width: 600px; margin-top: 60px; text-align: center; }
        
        /* 헤더 섹션 */
        .header-box { display: flex; align-items: center; justify-content: center; margin-bottom: 50px; }
        .brand-logo { width: 45px; height: auto; margin-right: 15px; }
        .header-text h1 { color: #bf953f; font-size: 24px; margin: 0; font-weight: 800; letter-spacing: -0.5px; }

        /* 카드 공통 스타일 */
        .support-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(191, 149, 63, 0.2); border-radius: 24px; padding: 35px 25px; margin-bottom: 30px; transition: 0.3s; }
        .support-card:hover { border-color: #bf953f; background: rgba(191, 149, 63, 0.05); }
        .icon-circle { width: 60px; height: 60px; background: rgba(191, 149, 63, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 20px; color: #bf953f; }
        h2 { font-size: 20px; margin-bottom: 15px; font-weight: 800; color: #fff; }
        p { font-size: 14px; color: #aaa; line-height: 1.6; margin-bottom: 25px; word-break: keep-all; }

        /* 버튼 스타일 */
        .btn { display: inline-block; width: 85%; padding: 15px 0; border-radius: 12px; font-weight: 700; text-decoration: none; font-size: 15px; transition: 0.3s; }
        .btn-gold { background: #bf953f; color: #000; }
        .btn-outline { border: 1px solid #bf953f; color: #bf953f; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        /* 하단 홈 버튼 */
        .back-home { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #bf953f, #aa771c); color: #000; padding: 16px 55px; border-radius: 50px; text-decoration: none; font-weight: 900; box-shadow: 0 12px 40px rgba(0,0,0,0.6); z-index: 1000; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-box">
            <img src="https://i.imgur.com/9VUt3sN.png" alt="Logo" class="brand-logo">
            <div class="header-text">
                <h1>원격 및 설치 지원</h1>
            </div>
        </div>

        <div class="support-card">
            <div class="icon-circle">🤖</div>
            <h2>안드로이드 원격 지원</h2>
            <p>갤럭시 등 안드로이드 사용자는 원격 제어를 통해 직접 설치를 도와드립니다.<br>아래 앱을 먼저 설치해 주세요.</p>
            <a href="https://play.google.com/store/apps/details?id=com.teamviewer.quicksupport.market" target="_blank" class="btn btn-gold">원격 지원 앱 다운로드</a>
        </div>

        <div class="support-card">
            <div class="icon-circle">🍎</div>
            <h2>아이폰 설치 가이드</h2>
            <p>아이폰은 보안상 원격 제어가 제한됩니다.<br>아래의 1분 설치 영상을 보시면 누구나 쉽게 직접 세팅이 가능합니다.</p>
            <a href="https://goldwave-notice.github.io/-/guide.html" class="btn btn-outline">📹 설치 영상 가이드 보기</a>
        </div>

        <div class="support-card" style="border-style: dashed;">
            <div class="icon-circle">💬</div>
            <h2>도움이 더 필요하신가요?</h2>
            <p>가이드를 봐도 어려우시다면 1:1 상담을 통해 상세히 안내해 드립니다.</p>
            <a href="https://open.kakao.com/me/goldwave" target="_blank" class="btn btn-gold">담당자 연결하기</a>
        </div>
    </div>

    <a href="https://goldwave-notice.github.io/-/dashboard.html" class="back-home">🏠 메인 대시보드</a>

</body>
</html>
